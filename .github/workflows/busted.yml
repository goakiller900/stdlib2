name: Busted tests

on:
  push:
    branches:
      - master
      - fix/busted-workflow
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.2 and LuaRocks
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --quiet \
            lua5.2 liblua5.2-dev luarocks >/tmp/apt-install.log 2>&1 || {
              cat /tmp/apt-install.log
              exit 1
            }

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo luarocks --lua-version=5.2 install busted >/tmp/busted-install.log 2>&1 || {
            cat /tmp/busted-install.log
            exit 1
          }
          sudo luarocks --lua-version=5.2 install faketorio >/tmp/faketorio-install.log 2>&1 || {
            cat /tmp/faketorio-install.log
            exit 1
          }

      - name: Run Busted test suite
        shell: bash
        run: |
          set -euo pipefail
          eval "$(luarocks --lua-version=5.2 path)"
          busted -o utfTerminal
