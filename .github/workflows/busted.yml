name: Busted tests

on:
  push:
    branches:
      - master
      - fix/busted-workflow
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lua 5.2 and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.2 liblua5.2-dev luarocks

      - name: Install test dependencies
        run: |
          sudo luarocks --lua-version=5.2 install busted
          sudo luarocks --lua-version=5.2 install faketorio

      - name: Run Busted test suite
        shell: bash
        run: |
          set -euo pipefail
          eval "$(luarocks --lua-version=5.2 path)"
          busted -o utfTerminal
