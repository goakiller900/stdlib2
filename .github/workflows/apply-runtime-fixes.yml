name: Apply validated runtime fixes

on:
  push:
    branches:
      - agent/fix-stdlib-2.1-runtime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Apply reviewed source payload
        shell: bash
        run: |
          set -euo pipefail
          cat .runtime-payload/part-* | base64 --decode > /tmp/runtime-fixes.tar.gz
          tar -xzf /tmp/runtime-fixes.tar.gz
          rm -rf .runtime-payload .github/workflows/apply-runtime-fixes.yml

      - name: Validate applied files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          info = json.loads(Path('info.json').read_text())
          assert info['name'] == 'stdlib2-continued'
          assert info['version'] == '2.1.1'
          assert info['factorio_version'] == '2.1'
          production = '\n'.join(path.read_text(errors='ignore') for path in Path('stdlib').rglob('*.lua'))
          for removed in ('game.write_file', 'game.remove_path', 'game.table_to_json'):
              assert removed not in production
          PY

      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finish stdlib Factorio 2.1 runtime migration"
          git push origin HEAD:agent/fix-stdlib-2.1-runtime
