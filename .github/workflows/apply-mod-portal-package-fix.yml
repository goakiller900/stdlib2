name: Apply Mod Portal packaging fix

on:
  push:
    branches:
      - agent/fix-mod-portal-package
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/fix-mod-portal-package
          fetch-depth: 0

      - name: Apply release packaging fix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          info_path = Path('info.json')
          info = json.loads(info_path.read_text(encoding='utf-8'))
          if info.get('version') != '2.1.1':
              raise SystemExit(f"Expected version 2.1.1, got {info.get('version')!r}")
          info['version'] = '2.1.2'
          ignore = info.setdefault('package', {}).setdefault('ignore', [])
          if '.publish/**' not in ignore:
              ignore.append('.publish/**')
          info_path.write_text(json.dumps(info, indent=2) + '\n', encoding='utf-8')

          changelog_path = Path('changelog.txt')
          changelog = changelog_path.read_text(encoding='utf-8')
          entry = '''---------------------------------------------------------------------------------------------------
          Version: 2.1.2
          Date: 2026-07-13
            Bugfixes:
              - Excluded legacy release scripts from public packages for Factorio Mod Portal compliance.
              - Added archive validation for executable and script extensions rejected by the Mod Portal.
          ---------------------------------------------------------------------------------------------------
          '''
          if 'Version: 2.1.2' not in changelog:
              changelog_path.write_text(entry + changelog, encoding='utf-8')

          workflow_path = Path('.github/workflows/package.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          workflow = workflow.replace(
              "            --exclude='.github/'\n",
              "            --exclude='.github/'\n            --exclude='.publish/'\n",
              1,
          )
          workflow = workflow.replace(
              r"grep -E \"^${PACKAGE}/(\.git|\.github|spec|tools|doc|wiki|faketorio)(/|$)\"",
              r"grep -E \"^${PACKAGE}/(\.git|\.github|\.publish|spec|tools|doc|wiki|faketorio)(/|$)\"",
              1,
          )
          marker = '''          if [[ -n "${offending_paths}" ]]; then
            echo "::error::Development-only files were included in the mod archive."
            printf '%s\\n' "${offending_paths}"
            exit 1
          fi

'''
          addition = '''          forbidden_paths="$(
            unzip -Z1 "${archive_path}" \\
              | grep -Ei '\\.(exe|bat|ps1|sh|py)$' \\
              || true
          )"

          if [[ -n "${forbidden_paths}" ]]; then
            echo "::error::The archive contains executable or script files forbidden by the Factorio Mod Portal."
            printf '%s\\n' "${forbidden_paths}"
            exit 1
          fi

'''
          if 'forbidden by the Factorio Mod Portal' not in workflow:
              if marker not in workflow:
                  raise SystemExit('Could not locate archive validation insertion point')
              workflow = workflow.replace(marker, marker + addition, 1)
          workflow_path.write_text(workflow, encoding='utf-8')

          Path('.github/workflows/apply-mod-portal-package-fix.yml').unlink()
          PY

      - name: Commit package fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Mod Portal release packaging"
          git push origin HEAD:agent/fix-mod-portal-package
